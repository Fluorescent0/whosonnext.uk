<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Leaderboard — WhosOnNext</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #09090C; --surface: #111318; --border: rgba(255,255,255,0.06); --gold: #D4A441; --gold-lt: #EEC060; --text: #EDE9E0; --text-muted: #6B7280; --r: 14px; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }
    .app { max-width: 480px; margin: 0 auto; padding: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1.8px; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; padding: 12px 8px; border-bottom: 1px solid var(--border); }
    td { padding: 16px 8px; border-bottom: 1px solid var(--border); font-weight: 500; }
    .rank { font-family: 'Bebas Neue'; color: var(--gold); font-size: 18px; width: 40px; }
    .wins { color: var(--gold-lt); font-weight: 700; }
    .pub-select { width: 100%; padding: 10px; margin-bottom: 15px; background: #181C26; color: white; border: 1px solid var(--border); border-radius: 8px; }
  </style>
</head>
<body>

<div class="app">
  <div class="card">
    <h1>DAILY STATS</h1>
    <select id="pub-filter" class="pub-select">
      <option value="all">Global (All Pubs)</option>
    </select>
    <table id="leaderboard">
      <thead><tr><th></th><th>PLAYER</th><th>PUB</th><th>WINS</th><th>PLAYED</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
    <a href="/" style="display:block; margin-top:20px; color:var(--text-muted); font-size:14px; text-decoration:none;">← Back to Game</a>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://faxosthjdprblsicpqye.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZheG9zdGhqZHByYmxzaWNwcXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxMjUwMTMsImV4cCI6MjA3ODcwMTAxM30.n87ztgEHte2XW3PQ67x-On_izxTJbhlX7vNeiKMtLc8')

  let stats = { all: {} };

  async function loadLeaderboard() {
    const today = new Date().toISOString().split('T')[0];
    const [sRes, pRes] = await Promise.all([
      supabase.from('sessions').select('id, state').eq('date', today),
      supabase.from('pubs').select('name, slug')
    ]);

    if (sRes.error) return console.error(sRes.error);

    const pubMap = new Map(pRes.data?.map(p => [p.slug, p.name]) || []);

    sRes.data.forEach(row => {
      const parts = row.id.split('-');
      const slug = parts.slice(1, -3).join('-');
      const pubName = pubMap.get(slug) || "Unknown Pub";
      
      if (!stats[pubName]) stats[pubName] = {};

      Object.entries(row.state?.scores || {}).forEach(([p, d]) => {
        [p, 'all'].forEach(key => {
          const target = key === 'all' ? stats.all : stats[pubName];
          if (!target[p]) target[p] = { wins: 0, played: 0, pub: pubName };
          target[p].wins += d.wins || 0;
          target[p].played += d.played || 0;
        });
      });
    });

    const filter = document.getElementById('pub-filter');
    Object.keys(stats).filter(k => k !== 'all').forEach(p => {
      filter.innerHTML += `<option value="${p}">${p}</option>`;
    });

    window.renderTable = (pub) => {
      const body = document.getElementById('lb-body');
      if (!body) return;
      const sorted = Object.entries(stats[pub] || {}).sort((a,b) => b[1].wins - a[1].wins);
      body.innerHTML = sorted.map(([n, s], i) => `
        <tr>
          <td class="rank">${i+1}</td>
          <td>${n}</td>
          <td style="font-size: 11px; color: var(--text-muted);">${pub === 'all' ? s.pub : pub}</td>
          <td class="wins">${s.wins}</td>
          <td>${s.played}</td>
        </tr>
      `).join('');
    };
    renderTable('all');
  }

  document.getElementById('pub-filter').addEventListener('change', (e) => {
    window.renderTable(e.target.value);
  });

  loadLeaderboard();
</script>
</body>
</html>
