# Redirect requests to /pubs/ (with no slug) to the landing page
[[redirects]]
  from = "/pubs/"
  to = "/"
  status = 301

# Table Manager for pub owners
[[redirects]]
  from = "/pubs/:slug/tables"
  to = "/tables/index.html"
  status = 200

# Match pub + table (e.g. /pubs/the-weaver-0001/table-2)
[[redirects]]
  from = "/pubs/:slug/:table"
  to = "/app/index.html"
  status = 200

# Match pub only — app defaults to table-1
[[redirects]]
  from = "/pubs/:slug"
  to = "/app/index.html"
  status = 200

# Redirects to success page for successful payments
[[redirects]]
  from = "/success"
  to = "/success/success.html"
  status = 200

# Redirects to cancelled page for cancelled payments
[[redirects]]
  from = "/cancelled"
  to = "/cancelled/cancelled.html"
  status = 200

# Catch-all 404 rule - MUST GO LAST!!!
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
